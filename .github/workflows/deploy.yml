name: 部署到 GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/images/.gitkeep'  # 忽略 images 文件夹的变更，防止循环
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  setup-folders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 检查并创建缺失的 images 文件夹
        id: check_folders
        run: |
          need_commit=false
          for dir in docs/notes/*/; do
            if [ -d "$dir" ] && [ ! -d "$dir/images" ]; then
              mkdir -p "$dir/images"
              touch "$dir/images/.gitkeep"
              echo "✅ 创建: $dir/images"
              need_commit=true
            fi
          done
          echo "need_commit=$need_commit" >> $GITHUB_OUTPUT
      
      - name: 提交变更
        if: steps.check_folders.outputs.need_commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto: 自动创建 images 文件夹 [skip ci]"
          git push

  build:
    needs: setup-folders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
